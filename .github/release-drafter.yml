name-template: "$RESOLVED_VERSION"
tag-template: "$RESOLVED_VERSION"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
sort-direction: ascending
autolabeler:
  - label: "chore"
    title:
      - "/chore:/i"
  - label: "bugfix"
    title:
      - "/fix:/i"
  - label: "feature"
    title:
      - "/feat:/i"
  - label: "enhancement"
    title:
      - "/refactor:/i"
  - label: "code-quality"
    title:
      - "/tests:/i"
  - label: "integration"
    files:
      - "custom_components/**/*"
  - label: "tests"
    files:
      - "tests/**/*"
  - label: "ci"
    files:
      - ".github/workflows/**/*"
      - ".github/release-drafter.yml"
      - ".pre-commit-config.yaml"
      - "pyproject.toml"
  - label: "documentation"
    files:
      - "README.md"
      - "CONTRIBUTING.md"
      - "info.md"
categories:
  - title: "💥 Breaking Change 💥"
    labels:
      - "breaking-change"
  - title: "⚡ Enhancements ⚡"
    labels:
      - "enhancement"
  - title: "✨ New Features ✨"
    labels:
      - "feature"
  - title: "🐛 Bug Fixes 🐛"
    labels:
      - "fix"
      - "bugfix"
      - "bug"
  - title: "🔧 Maintenance 🔧"
    labels:
      - "chore"
  - title: "🎓 Code Quality 🎓"
    labels:
      - "code-quality"
  - title: "🔩 Dependency 🔩"
    labels:
      - "dependencies"
template: |
  [![Downloads for this release](https://img.shields.io/github/downloads/firstof9/ha-openei/$RESOLVED_VERSION/total.svg)](https://github.com/firstof9/ha-openei/releases/$RESOLVED_VERSION)

  $CHANGES

  ## Links
  - [Submit bugs/feature requests](https://github.com/firstof9/ha-openei/issues)

version-resolver:
  major:
    labels:
      - "breaking-change"
  minor:
    labels:
      - "feature"
  patch:
    labels:
      - "bugfix"
      - "fix"
      - "bug"
      - "chore"
  default: patch
