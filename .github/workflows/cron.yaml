name: Cron actions

on:
  schedule:
    - cron:  '0 0 * * *'

permissions:
  contents: read

jobs:
  validate:
    runs-on: "ubuntu-latest"
    name: Validate
    steps:
        - name: Harden Runner
          uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
          with:
            egress-policy: audit

        - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          with:
            persist-credentials: false

        - name: HACS validation
          uses: hacs/action@dcb30e72781db3f207d5236b861172774ab0b485 # v22.5.0
          with:
            category: "integration"
            ignore: brands

        - name: Hassfest validation
          uses: home-assistant/actions/hassfest@868e6cb4607727d764341a158d98872cd63fa658 # v1.0.0
