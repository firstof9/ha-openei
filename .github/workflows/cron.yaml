name: Cron actions

on:
  schedule:
    - cron:  '0 0 * * *'

permissions:
  contents: read

jobs:
  validate:
    runs-on: "ubuntu-latest"
    name: Validate
    steps:
        - name: Harden Runner
          uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
          with:
            egress-policy: audit

        - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
          with:
            persist-credentials: false

        - name: HACS validation
          uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa # v22.5.0
          with:
            category: "integration"
            ignore: brands

        - name: Hassfest validation
          uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c # v1.0.0
